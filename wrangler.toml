name       = "dealer-reports-backend"
main       = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "CACHE"
id      = "5af14d5eab9f41f38a34cbc245c73f30"

[[kv_namespaces]]
binding = "TOKENS"
id      = "8e28939fbbe44d019afbd4e774626d32"

[[kv_namespaces]]
binding = "LEADS_SYNC_CONFIG"
id      = "352dc4a8e9244b88b315a12590fd6a1a"

[[d1_databases]]
binding      = "DB"
database_name = "postal-codes-db"
database_id   = "a518623c-f74b-4889-98da-d9ddda0ff632"

[observability.logs]
enabled = true
invocation_logs = true

[vars]
CACHE_TTL_MINUTES = "60"

# Background sync — pulls Seriti's and Mixpanel's data into D1 every hour,
# day-by-day, so live dashboard requests never call either API directly.
# Uses the single shared cron slot for BOTH syncs (this account is capped
# at 5 total cron triggers across all Workers).
[triggers]
crons = ["0 * * * *"]

