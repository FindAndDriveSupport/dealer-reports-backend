name       = "dealer-reports-backend"
main       = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "CACHE"
id      = "5af14d5eab9f41f38a34cbc245c73f30"

[[kv_namespaces]]
binding = "TOKENS"
id      = "8e28939fbbe44d019afbd4e774626d32"

[[d1_databases]]
binding      = "DB"
database_name = "postal-codes-db"
database_id   = "a518623c-f74b-4889-98da-d9ddda0ff632"

[observability.logs]
enabled = true
invocation_logs = true

[vars]
CACHE_TTL_MINUTES = "60"

# Cron Trigger temporarily removed — account is at its 5-cron-trigger limit
# (shared across all Workers on this account, e.g. leads-api's pipeline).
# Data still syncs fine via manual "Refresh data" on /admin in the meantime.
# Once a slot frees up (or an existing cron gets consolidated), re-add:
#
# [triggers]
# crons = ["*/30 * * * *"]
